services:
  syncbricks:
    build: .
    container_name: syncbricks
    ports:
      - "3000:3000"
    volumes:
      - syncbricks-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=/app/data/syncbricks.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  syncbricks-data:
